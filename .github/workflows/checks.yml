name: Build and performance checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-perf:
    runs-on: ubuntu-latest
    env:
      CHROME_PATH: /usr/bin/google-chrome
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build deploy assets
        run: npm run build

      - name: Run Lighthouse performance checks
        run: npm run perf
