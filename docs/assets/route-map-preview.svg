<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Japan itinerary route preview</title>
  <desc id="desc">A static preview of the Osaka to Tokyo travel route.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffaf4"/>
      <stop offset="100%" stop-color="#f1e5d8"/>
    </linearGradient>
    <linearGradient id="route" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#a9493f"/>
      <stop offset="100%" stop-color="#d08a56"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5b3a23" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="960" height="560" rx="36" fill="url(#bg)"/>
  <g opacity="0.18">
    <circle cx="132" cy="118" r="84" fill="#c07162"/>
    <circle cx="818" cy="120" r="96" fill="#d6b27f"/>
    <circle cx="786" cy="438" r="116" fill="#d6b27f"/>
  </g>
  <g stroke="#d8cab8" stroke-linecap="round" stroke-width="10" opacity="0.45">
    <path d="M132 430 224 332 302 300 358 246 420 242 512 280 612 280 708 244 794 182"/>
    <path d="M238 156 316 198 402 170 474 190 552 154 642 164 722 136"/>
  </g>
  <g filter="url(#shadow)">
    <path
      d="M166 402
         C210 386 232 358 250 326
         C270 286 306 250 352 234
         C388 222 420 226 448 248
         C474 268 500 290 540 296
         C580 302 616 286 648 260
         C682 232 724 200 772 186"
      fill="none"
      stroke="url(#route)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="10"/>
  </g>
  <g fill="#fffaf4" stroke="#8e352b" stroke-width="4">
    <circle cx="166" cy="402" r="11"/>
    <circle cx="250" cy="326" r="11"/>
    <circle cx="352" cy="234" r="11"/>
    <circle cx="540" cy="296" r="11"/>
    <circle cx="648" cy="260" r="11"/>
    <circle cx="772" cy="186" r="11"/>
  </g>
  <g fill="#6f241f" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">
    <text x="124" y="446">Osaka</text>
    <text x="222" y="312">Kyoto</text>
    <text x="300" y="214">Shin-Osaka</text>
    <text x="494" y="332">Mt. Fuji area</text>
    <text x="742" y="172">Tokyo</text>
  </g>
  <g fill="#6c5f59" font-family="Segoe UI, sans-serif" font-size="20">
    <text x="54" y="86">Static route preview</text>
    <text x="54" y="114">Open the live map only when you need the interactive view.</text>
  </g>
</svg>
