<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">日本旅行の線ルート参考図</title>
  <desc id="desc">大阪、京都、大阪、新大阪、小田原、箱根、富士山エリア、東京を1本のシンプルな線で示したルート参考図。</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf5"/>
      <stop offset="100%" stop-color="#f2e7da"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b54131"/>
      <stop offset="100%" stop-color="#3f5a4b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#5c3b27" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#3f5a4b"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="36" fill="url(#bg)"/>
  <circle cx="1010" cy="102" r="76" fill="#f6e3dd"/>
  <circle cx="154" cy="462" r="86" fill="#e2ece8"/>

  <g transform="translate(72 72)">
    <text x="0" y="0" fill="#b54131" font-size="18" font-weight="700" font-family="'Avenir Next', Arial, sans-serif" letter-spacing="3">ルート参考図</text>
    <text x="0" y="38" fill="#1f2527" font-size="38" font-weight="700" font-family="'Yu Mincho', 'Hiragino Mincho ProN', serif">日本旅行</text>
    <text x="0" y="70" fill="#5e6768" font-size="19" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">シンプルな移動ルート</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="52" y="52" width="1096" height="456" rx="28" fill="rgba(255,255,255,0.28)" stroke="rgba(255,255,255,0.4)"/>
  </g>

  <path
    d="M280 126V250L190 360H1000"
    fill="none"
    stroke="url(#line)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    marker-end="url(#arrow)"/>

  <g font-family="'Avenir Next', Arial, sans-serif" text-anchor="middle">
    <g transform="translate(280 126)">
      <circle r="17" fill="#b54131" stroke="#ffffff" stroke-width="5"/>
      <text y="5" fill="#ffffff" font-size="13" font-weight="700">1</text>
    </g>
    <g transform="translate(280 250)">
      <circle r="17" fill="#b54131" stroke="#ffffff" stroke-width="5"/>
      <text y="5" fill="#ffffff" font-size="13" font-weight="700">2</text>
    </g>
    <g transform="translate(190 360)">
      <circle r="17" fill="#b54131" stroke="#ffffff" stroke-width="5"/>
      <text y="5" fill="#ffffff" font-size="13" font-weight="700">3</text>
    </g>
    <g transform="translate(340 360)">
      <circle r="17" fill="#b54131" stroke="#ffffff" stroke-width="5"/>
      <text y="5" fill="#ffffff" font-size="13" font-weight="700">4</text>
    </g>
    <g transform="translate(520 360)">
      <circle r="17" fill="#3f5a4b" stroke="#ffffff" stroke-width="5"/>
      <text y="5" fill="#ffffff" font-size="13" font-weight="700">5</text>
    </g>
    <g transform="translate(660 360)">
      <circle r="17" fill="#3f5a4b" stroke="#ffffff" stroke-width="5"/>
      <text y="5" fill="#ffffff" font-size="13" font-weight="700">6</text>
    </g>
    <g transform="translate(820 360)">
      <circle r="17" fill="#3f5a4b" stroke="#ffffff" stroke-width="5"/>
      <text y="5" fill="#ffffff" font-size="13" font-weight="700">7</text>
    </g>
    <g transform="translate(1000 360)">
      <circle r="19" fill="#3f5a4b" stroke="#ffffff" stroke-width="5"/>
      <text y="6" fill="#ffffff" font-size="14" font-weight="700">8</text>
    </g>
  </g>

  <g fill="#1f2527" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="314" y="116" font-size="24" font-weight="700">大阪</text>
    <text x="314" y="142" font-size="15" fill="#5e6768">出発</text>

    <text x="308" y="240" font-size="24" font-weight="700">京都</text>
    <text x="308" y="266" font-size="15" fill="#5e6768">日帰り</text>

    <text x="112" y="398" font-size="24" font-weight="700">大阪</text>
    <text x="112" y="424" font-size="15" fill="#5e6768">戻る</text>

    <text x="340" y="330" text-anchor="middle" font-size="22" font-weight="700">新大阪</text>
    <text x="340" y="304" text-anchor="middle" font-size="15" fill="#5e6768">新幹線</text>

    <text x="520" y="330" text-anchor="middle" font-size="22" font-weight="700">小田原</text>
    <text x="520" y="304" text-anchor="middle" font-size="15" fill="#5e6768">乗り換え</text>

    <text x="660" y="330" text-anchor="middle" font-size="22" font-weight="700">箱根</text>
    <text x="660" y="304" text-anchor="middle" font-size="15" fill="#5e6768">宿泊</text>

    <text x="820" y="330" text-anchor="middle" font-size="22" font-weight="700">富士山エリア</text>
    <text x="820" y="304" text-anchor="middle" font-size="15" fill="#5e6768">景色</text>

    <text x="1000" y="330" text-anchor="middle" font-size="24" font-weight="700">東京</text>
    <text x="1000" y="304" text-anchor="middle" font-size="15" fill="#5e6768">到着</text>
  </g>
</svg>
