<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">日本旅行の線型ルート参考図</title>
  <desc id="desc">大阪、京都、新大阪、小田原、箱根、富士山エリア、東京を示した、見やすい線型ルート参考図。</desc>
  <defs>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#6c4c37" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f7f0e6"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="28" fill="#fffdfa" stroke="#eaded0" stroke-width="2"/>
  </g>

  <circle cx="1026" cy="114" r="78" fill="#f6e4dd" opacity="0.7"/>
  <circle cx="170" cy="438" r="92" fill="#e7efeb" opacity="0.8"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M198 312H1082" stroke="#d6c7bb" stroke-width="4"/>

    <path d="M272 296L294 312L272 328" stroke="#c55443" stroke-width="6"/>
    <path d="M446 296L468 312L446 328" stroke="#c55443" stroke-width="6"/>
    <path d="M656 296L678 312L656 328" stroke="#c55443" stroke-width="6"/>
    <path d="M848 296L870 312L848 328" stroke="#c55443" stroke-width="6"/>
    <path d="M1028 296L1050 312L1028 328" stroke="#c55443" stroke-width="6"/>

    <circle cx="318" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
    <circle cx="520" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
    <circle cx="730" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
    <circle cx="916" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
  </g>

  <g fill="#24282b">
    <text x="178" y="322" text-anchor="end" font-size="50" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">大阪</text>

    <text x="304" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">京都</text>
    <text x="526" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">新大阪</text>
    <text x="758" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">小田原</text>
    <text x="928" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">箱根</text>
    <text x="1098" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">東京</text>
  </g>

  <g>
    <rect x="846" y="352" width="186" height="58" rx="29" fill="#f1e6db" stroke="#e3d3c5" stroke-width="2"/>
    <text x="939" y="389" text-anchor="middle" fill="#3d4748" font-size="32" font-weight="600" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">富士山エリア</text>
  </g>
</svg>
