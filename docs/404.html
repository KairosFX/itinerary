<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Kairos VIII</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/jpeg" href="./assets/icons/1yegabjjbjp01.jpg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08100c;
      --panel: rgba(20, 34, 25, 0.78);
      --ink: #f2f7f3;
      --muted: rgba(226, 237, 228, 0.72);
      --line: rgba(214, 232, 218, 0.16);
      --accent: #9bc4a7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at 18% 16%, rgba(126, 184, 143, 0.24), transparent 28rem),
        radial-gradient(circle at 84% 18%, rgba(233, 192, 122, 0.16), transparent 26rem),
        linear-gradient(180deg, #07100c, #111b15);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    }

    main {
      width: min(100%, 42rem);
      padding: clamp(1.3rem, 5vw, 3rem);
      border: 1px solid var(--line);
      border-radius: 2rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)), var(--panel);
      box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.28);
    }

    p {
      margin: 0;
      color: var(--muted);
      font-family: "Segoe UI", sans-serif;
      line-height: 1.65;
    }

    .eyebrow {
      margin-bottom: 0.8rem;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 0.8rem;
      font-size: clamp(2.2rem, 9vw, 4.8rem);
      line-height: 0.95;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 1.4rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 2.5rem;
      padding: 0.62rem 1rem;
      border: 1px solid rgba(216, 237, 221, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font-family: "Segoe UI", sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid rgba(155, 196, 167, 0.38);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Kairos VIII</p>
    <h1>Route not found.</h1>
    <p>This link does not match a published page in the itinerary. Return to the main guide or open the printable travel sheet.</p>
    <div class="actions">
      <a href="./">Back to itinerary</a>
      <a href="./travel-sheet.html">Print travel sheet</a>
    </div>
  </main>
</body>
</html>
